name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: install
      run: |
        sudo rm -f /var/lib/man-db/auto-update
        sudo ./test/install.sh
    - name: test
      run: ./test/all.sh
    - name: platforms
      run: ./test/platforms.sh
